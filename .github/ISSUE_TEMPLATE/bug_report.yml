name: Bug report
description: Report a reproducible SkillOS problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Include the exact command and output.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Agent adapter
      options:
        - Core CLI
        - Codex
        - Claude Code
        - Generic
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: SkillOS version or commit
      placeholder: v1.1.0 or commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, Node/npx availability, and agent version if relevant.


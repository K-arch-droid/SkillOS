name: Feature request
description: Suggest a new SkillOS capability or adapter.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or agent workflow should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should SkillOS do?
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - Adapter
        - Rating
        - Routing
        - Workflow
        - Conflict detection
        - Documentation
        - Other

